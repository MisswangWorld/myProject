<ion-item button lines="none" (click)="onBuyClick()">
  <div class="row">

    <!-- LEFT: symbol + contextual subtitle -->
    <div class="row__left">
      <span class="row__symbol">{{ security.symbol }}</span>

      @if (shares !== null) {
        <span class="row__sub">{{ shares | number:'1.0-4' }} shares</span>
      } @else {
        <span class="row__sub">{{ security.fullName }}</span>
      }
    </div>

    <!-- CENTER-RIGHT: current price (hidden in search-results variant) -->
    @if (showPrice) {
      <span class="row__price">{{ security.ask | currency:'USD':'symbol':'1.2-2' }}</span>
    }

    <!-- FAR RIGHT: change badge (holdings variant only) -->
    @if (shares !== null && changePercent !== null) {
      <span class="change-badge" [ngClass]="changeBadgeClass">
        {{ formattedChangePercent }}
      </span>
    }

  </div>
</ion-item>
