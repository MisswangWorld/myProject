<!-- order-form.component.html -->
@if (security !== null) {

  <!-- Backdrop: tap to dismiss -->
  <div class="backdrop" @backdropFade (click)="handleDismiss()" aria-hidden="true"></div>

  <!-- Sheet slides up from bottom.
       aria-labelledby ties the dialog to its visible title for screen readers.
       (keydown) on the sheet container handles the focus trap and Escape. -->
  <div
    class="sheet"
    @sheetSlide
    role="dialog"
    aria-modal="true"
    aria-labelledby="order-form-title"
    (keydown)="handleSheetKeydown($event)"
  >

    <!-- Header: "NVDA $821.27" — id links the title to the dialog's aria-labelledby -->
    <h2 class="sheet__title" id="order-form-title">
      {{ security.symbol }}&nbsp;{{ security.ask | currency:'USD':'symbol':'1.2-2' }}
    </h2>

    <!-- Input fields — bordered box style matching Figma -->
    <div class="field">
      <span class="field__label">Price</span>
      <span class="field__value">At market</span>
    </div>

    <div class="field field--active">
      <label class="field__label" for="amount-input">Amount</label>
      <div class="field__input-row">
        <span class="field__currency">$</span>
        <input
          id="amount-input"
          class="field__input"
          type="number"
          min="0"
          placeholder="0.00"
          [value]="amount"
          (input)="handleAmountInput($event)"
        />
      </div>
    </div>

    <div class="field">
      <span class="field__label">Shares</span>
      <!-- Auto-computed from amount ÷ ask price -->
      <span class="field__value">{{ computedShares }}</span>
    </div>

    <!--
      Swipe-to-buy button.
      role="button" + tabindex makes it keyboard-reachable (focus trap cycles here).
      aria-label gives screen readers "Buy NVDA" rather than "Swipe to buy" (which is
      a gesture instruction meaningless outside a pointer context).
      aria-disabled reflects state without removing focus so the user can still tab past.
      (keydown) handles Enter/Space as the keyboard alternative to the swipe gesture.
      tabindex is -1 when disabled/submitting so the focus trap skips it automatically.
    -->
    <div
      class="swipe-btn"
      role="button"
      [attr.tabindex]="isAmountValid && formStatus !== 'submitting' ? '0' : '-1'"
      [attr.aria-label]="'Buy ' + security.symbol"
      [attr.aria-disabled]="!isAmountValid || formStatus === 'submitting'"
      [class.swipe-btn--disabled]="!isAmountValid"
      [class.swipe-btn--submitting]="formStatus === 'submitting'"
      (keydown)="handleSwipeKeydown($event)"
    >
      <div
        class="swipe-btn__chevron"
        [class.is-dragging]="isDragging"
        [style.transform]="'translateX(' + dragX + 'px)'"
        (pointerdown)="handlePointerDown($event)"
        (pointermove)="handlePointerMove($event)"
        (pointerup)="handlePointerUp()"
        (pointercancel)="handlePointerUp()"
      >
        <img src="assets/icons/buy-chevrons.svg" alt="" aria-hidden="true" />
      </div>
      <span class="swipe-btn__label">Swipe to buy</span>
    </div>

    <!--
      aria-live="polite" announces order status changes after the user finishes their
      current action. aria-atomic="true" reads the full string, not just the changed text.
      The element is always present so screen readers register it before the first update.
    -->
    <div role="status" aria-live="polite" aria-atomic="true" class="sr-only">{{ liveAnnouncement }}</div>

  </div>

}
